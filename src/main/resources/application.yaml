spring:
  application:
    name: tabelafipe
  datasource:
    url: jdbc:postgresql://localhost:5432/fipe_analyzer
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true